<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Wheel Desktop</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #101014;
      --panel-2: #17171d;
      --panel-3: #202028;
      --text: #ffffff;
      --muted: #9a9aa5;
      --muted-2: #6f6f78;
      --line: #24242d;
      --blue: #2f80ff;
      --blue-dark: #1768e8;
      --red: #ff5266;
      --green: #75c85a;
      --sidebar-width: 280px;
      --editor-width: 420px;
      --splitter-size: 12px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-columns: var(--sidebar-width) var(--splitter-size) minmax(360px, 1fr) var(--splitter-size) var(--editor-width);
      background:
        radial-gradient(circle at 50% 42%, rgba(40, 40, 52, 0.9), transparent 28%),
        #000;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 0 0 minmax(0, 1fr) var(--splitter-size) var(--editor-width);
    }

    .app.editor-collapsed {
      grid-template-columns: var(--sidebar-width) var(--splitter-size) minmax(0, 1fr) 0 0;
    }

    .app.sidebar-collapsed.editor-collapsed {
      grid-template-columns: 0 0 minmax(0, 1fr) 0 0;
    }

    .app.sidebar-collapsed .sidebar,
    .app.sidebar-collapsed #leftSplitter,
    .app.editor-collapsed .editor,
    .app.editor-collapsed #rightSplitter {
      display: none;
    }

    .app.resizing,
    .app.resizing * {
      cursor: col-resize;
      -webkit-user-select: none;
      user-select: none;
    }

    .sidebar,
    .editor {
      height: 100vh;
      height: 100dvh;
      min-width: 0;
      overflow: auto;
      background: #09090c;
      border-color: var(--line);
      padding: 22px;
      scrollbar-gutter: stable;
    }

    .sidebar {
      grid-column: 1;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 18px;
      container: sidebar / inline-size;
    }

    .editor {
      grid-column: 5;
      border-left: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 0 22px 22px;
    }

    .splitter {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: transparent;
      touch-action: none;
      border: 0;
      cursor: col-resize;
    }

    .splitter::before {
      content: "";
      width: 2px;
      height: 100%;
      background: linear-gradient(180deg, transparent, rgba(47, 128, 255, 0.26) 18%, rgba(47, 128, 255, 0.26) 82%, transparent);
      transition: background 140ms ease, box-shadow 140ms ease;
    }

    .splitter:hover::before,
    .splitter:focus-visible::before,
    .app.resizing .splitter::before {
      background: linear-gradient(180deg, transparent, rgba(47, 128, 255, 0.68) 18%, rgba(47, 128, 255, 0.68) 82%, transparent);
      box-shadow: 0 0 0 1px rgba(47, 128, 255, 0.18);
    }

    .splitter:focus-visible {
      outline: none;
    }

    .splitter-handle {
      position: absolute;
      width: 100%;
      height: 78px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(19, 19, 28, 0.96), rgba(11, 11, 16, 0.98));
      border: 1px solid #242432;
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.32);
    }

    .splitter-handle::before {
      content: "⋮⋮";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #777787;
      font-size: 14px;
      letter-spacing: 0;
    }

    .panel-toggle {
      position: fixed;
      top: 16px;
      z-index: 12;
      width: 34px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      border: 1px solid #2a2a38;
      background: linear-gradient(180deg, #1b1b24, #101017);
      color: #f5f5f7;
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.42);
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .panel-toggle:hover {
      background: linear-gradient(180deg, #232332, #15151e);
      border-color: rgba(47, 128, 255, 0.64);
    }

    .panel-toggle-left {
      left: calc(var(--sidebar-width) + var(--splitter-size) + 10px);
    }

    .panel-toggle-right {
      right: calc(var(--editor-width) + var(--splitter-size) + 10px);
    }

    .app.sidebar-collapsed .panel-toggle-left {
      left: 12px;
    }

    .app.editor-collapsed .panel-toggle-right {
      right: 12px;
    }

    .panel-toggle:active,
    .panel-toggle-left:active {
      transform: scale(0.96);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .emoji-bubble {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: #15151d;
      display: grid;
      place-items: center;
      font-size: 31px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.5);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .section-title h2,
    .editor h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .ghost-btn,
    .folder-action,
    .drag-handle {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .ghost-btn {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #17171f;
      color: #d6d6df;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #262632;
      transition: background 140ms ease, border-color 140ms ease;
    }

    .ghost-btn:hover {
      background: #1d1d27;
      border-color: #303040;
    }

    .wheel-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      max-width: 100%;
    }

    .folder-group {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid #1b1b24;
      background: linear-gradient(180deg, rgba(18, 18, 25, 0.96), rgba(11, 11, 16, 0.98));
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .folder-group.uncategorized {
      background: linear-gradient(180deg, rgba(14, 14, 20, 0.96), rgba(8, 8, 12, 0.98));
    }

    .folder-header {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .folder-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
    }

    .folder-title strong {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .folder-badge,
    .folder-count {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .folder-badge {
      background: rgba(47, 128, 255, 0.12);
      color: #7fb2ff;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .folder-count {
      background: #161621;
      color: #9494a1;
    }

    .folder-tools {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
    }

    .folder-action {
      min-width: 30px;
      height: 30px;
      padding: 0 8px;
      border-radius: 10px;
      background: #171720;
      color: #d6d6df;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid #252533;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .folder-action:hover {
      background: #1d1d29;
      border-color: #2f2f40;
    }

    .folder-action.danger {
      color: #ff7b8b;
    }

    .folder-wheels {
      min-width: 0;
      max-width: 100%;
      min-height: 58px;
      display: grid;
      gap: 8px;
      padding: 2px;
      border-radius: 14px;
      transition: background 140ms ease, box-shadow 140ms ease;
    }

    .folder-wheels.drag-over {
      background: rgba(47, 128, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(47, 128, 255, 0.45);
    }

    .folder-empty {
      min-height: 42px;
      border-radius: 12px;
      border: 1px dashed #262636;
      display: grid;
      place-items: center;
      color: #666673;
      font-size: 12px;
      text-align: center;
      padding: 10px;
    }

    .wheel-item {
      width: 100%;
      min-width: 0;
      min-height: 58px;
      border-radius: 15px;
      background: #111116;
      border: 1px solid #1d1d25;
      color: #fff;
      text-align: left;
      padding: 12px;
      transition: background 140ms ease, transform 140ms ease, border-color 140ms ease;
      position: relative;
    }

    .wheel-item:hover {
      background: #17171f;
      transform: translateY(-1px);
    }

    .wheel-item.active {
      background: #1f1f2b;
      border-color: rgba(47, 128, 255, 0.7);
      box-shadow: inset 0 0 0 1px rgba(47, 128, 255, 0.18);
    }

    .wheel-item.dragging,
    .option-row.dragging {
      opacity: 0.45;
    }

    .wheel-item.drop-before,
    .option-row.drop-before {
      box-shadow: inset 0 3px 0 rgba(47, 128, 255, 0.92);
    }

    .wheel-item.drop-after,
    .option-row.drop-after {
      box-shadow: inset 0 -3px 0 rgba(47, 128, 255, 0.92);
    }

    .wheel-item strong {
      display: block;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wheel-item span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .sidebar-actions {
      margin-top: auto;
      display: grid;
      gap: 9px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .data-panel {
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid #1b1b24;
      background: linear-gradient(180deg, rgba(17, 17, 25, 0.96), rgba(10, 10, 14, 0.98));
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .data-status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .data-status-badge {
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      background: rgba(47, 128, 255, 0.14);
      color: #7fb2ff;
      flex: 0 0 auto;
    }

    .data-status-badge.warning {
      background: rgba(255, 82, 102, 0.14);
      color: #ff96a2;
    }

    .data-status strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .data-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .main {
      grid-column: 3;
      min-width: 0;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      place-items: center;
      padding: 28px 24px 30px;
      overflow: hidden;
    }

    .top-title {
      width: min(680px, 100%);
      text-align: center;
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .tiny-tag {
      background: #1e1e2a;
      color: var(--blue);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 15px;
      font-weight: 650;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .title-input {
      width: min(620px, 100%);
      border: 0;
      outline: none;
      background: transparent;
      color: #fff;
      text-align: center;
      font-size: 42px;
      font-weight: 760;
      letter-spacing: 0;
      padding: 0 8px;
    }

    .title-input::placeholder {
      color: #5f5f69;
    }

    .wheel-stage {
      width: min(100%, max(220px, calc(100dvh - 190px)), 760px);
      max-width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      position: relative;
      touch-action: manipulation;
    }

    .wheel-shadow {
      position: absolute;
      inset: 5%;
      border-radius: 50%;
      background: #16161b;
      box-shadow: 0 28px 58px rgba(0, 0, 0, 0.78);
    }

    canvas {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
      border-radius: 50%;
    }

    .center-button {
      width: clamp(82px, 10vh, 112px);
      height: clamp(82px, 10vh, 112px);
      position: absolute;
      z-index: 4;
      border-radius: 50%;
      background: #24242c;
      box-shadow: 0 0 0 8px #24242c, inset 0 0 0 7px #6b6b75, inset 0 0 0 17px #24242c;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .center-button:hover:not(:disabled) {
      transform: scale(1.045);
      filter: brightness(1.08);
    }

    .center-button:active:not(:disabled) {
      transform: scale(0.96);
    }

    .center-button:disabled {
      cursor: not-allowed;
      opacity: 0.72;
    }

    .pointer {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 54px solid #24242c;
      filter: drop-shadow(0 -2px 0 rgba(255, 255, 255, 0.05));
      pointer-events: none;
    }

    .result {
      min-height: 74px;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .result small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 5px;
    }

    .result strong {
      display: block;
      font-size: 34px;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .btn {
      min-height: 42px;
      border-radius: 12px;
      background: #1a1a22;
      color: #fff;
      font-weight: 730;
      border: 1px solid rgba(255, 255, 255, 0.055);
      transition: background 140ms ease, transform 140ms ease, opacity 140ms ease;
    }

    .btn:hover:not(:disabled) {
      background: #23232d;
    }

    .btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn.blue {
      color: #fff;
      background: var(--blue-dark);
    }

    .btn.red {
      background: #2a1218;
      color: #ff6b7d;
    }

    .editor-top {
      display: grid;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 8;
      margin: 0 -22px;
      padding: 22px 22px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(9, 9, 12, 0.98), rgba(9, 9, 12, 0.94) 76%, rgba(9, 9, 12, 0.78));
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.32);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .editor-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .total {
      color: #ffffff;
      font-size: 16px;
      font-weight: 860;
      line-height: 1;
      white-space: nowrap;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.08);
    }

    .hint {
      color: #7f7f89;
      font-size: 12px;
      line-height: 1.45;
      margin: 0;
    }

    .option-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 12px;
    }

    .option-row {
      background: #101016;
      border: 1px solid #1d1d25;
      border-radius: 15px;
      padding: 10px;
      display: grid;
      grid-template-columns: 28px 40px minmax(0, 1fr) 76px 34px;
      gap: 8px;
      align-items: center;
      transition: box-shadow 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .option-row.inactive {
      background: #0b0b10;
      border-color: #16161e;
      opacity: 0.74;
    }

    .drag-handle {
      width: 28px;
      height: 40px;
      border-radius: 10px;
      background: #181821;
      color: #888895;
      font-size: 18px;
      line-height: 1;
      display: grid;
      place-items: center;
      border: 1px solid #242432;
    }

    .drag-handle:hover {
      background: #20202b;
      color: #c8c8d4;
    }

    .color-input {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 0;
      outline: none;
      border-radius: 11px;
      background: transparent;
      overflow: hidden;
    }

    .color-input::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-input::-webkit-color-swatch {
      border: 0;
      border-radius: 11px;
    }

    .text-input,
    .weight-input {
      height: 40px;
      border: 0;
      outline: none;
      border-radius: 11px;
      background: #1a1a22;
      color: #fff;
      padding: 0 10px;
      min-width: 0;
      border: 1px solid transparent;
    }

    .text-input:focus,
    .weight-input:focus,
    .title-input:focus {
      border-color: rgba(47, 128, 255, 0.62);
      box-shadow: 0 0 0 3px rgba(47, 128, 255, 0.12);
    }

    .weight-wrap {
      position: relative;
    }

    .weight-input {
      width: 100%;
      padding-right: 24px;
      text-align: right;
    }

    .weight-wrap::after {
      content: "%";
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: #777782;
      font-size: 12px;
      pointer-events: none;
    }

    .option-tools {
      grid-column: 5;
      grid-row: 1 / 3;
      display: grid;
      gap: 6px;
      align-self: stretch;
      align-content: center;
    }

    .description-option,
    .delete-option {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      line-height: 1;
    }

    .description-option {
      background: #141824;
      color: #9ebfff;
      font-size: 15px;
      font-weight: 900;
      border: 1px solid #263452;
    }

    .description-option:hover,
    .description-option.has-description {
      background: rgba(47, 128, 255, 0.24);
      color: #ffffff;
      border-color: rgba(127, 178, 255, 0.72);
    }

    .delete-option {
      background: #221016;
      color: #ff6b7d;
      font-size: 20px;
    }

    .actual-probability {
      grid-column: 3 / 5;
      color: #8f8f99;
      font-size: 11px;
      margin-top: -2px;
    }

    .wheel-tooltip {
      position: absolute;
      z-index: 7;
      max-width: min(260px, 74%);
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(245, 245, 247, 0.96);
      color: #101014;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.38);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 720;
      white-space: pre-wrap;
      pointer-events: none;
    }

    .wheel-tooltip[hidden] {
      display: none;
    }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.62);
      display: grid;
      place-items: center;
      padding: 20px;
      z-index: 20;
    }

    .dialog-backdrop[hidden] {
      display: none;
    }

    .dialog {
      width: min(420px, 100%);
      max-height: calc(100dvh - 40px);
      overflow: auto;
      border-radius: 22px;
      background: linear-gradient(180deg, #161620, #0f0f16);
      border: 1px solid #262634;
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.45);
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .dialog h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .dialog p {
      margin: 0;
      color: #a1a1ad;
      font-size: 14px;
      line-height: 1.5;
    }

    .dialog-input,
    .dialog-textarea {
      height: 44px;
      border-radius: 12px;

</head>
<body>
  <main class="app">
    <aside id="sidebarPanel" class="sidebar">
      <div class="brand">
        <div class="emoji-bubble" aria-hidden="true">🛞</div>
        <div>
          <h1>Tiny Wheel</h1>
          <p>Selector de ruletas</p>
        </div>
      </div>

      <div class="section-title">
        <h2>Ruedas</h2>
        <button id="newFolderButton" class="ghost-btn" type="button">Nueva carpeta</button>
      </div>

      <div id="wheelList" class="wheel-list" aria-label="Selector de ruedas"></div>

      <section class="data-panel" aria-labelledby="dataSectionTitle">
        <div class="section-title">
          <h2 id="dataSectionTitle">Archivo</h2>
          <div class="data-status">
            <span id="dataFileBadge" class="data-status-badge">Local</span>
            <strong id="dataFileName">Sin JSON</strong>
          </div>
        </div>
        <p id="dataFileHint" class="hint">Crea o vincula un archivo JSON para guardar las ruedas fuera del HTML.</p>
        <div class="data-actions">
          <button id="createDataFileButton" class="btn" type="button">Crear JSON</button>
          <button id="openDataFileButton" class="btn" type="button">Abrir JSON</button>
          <button id="saveDataFileButton" class="btn blue" type="button">Guardar JSON</button>
        </div>
      </section>

      <div class="sidebar-actions">
        <button id="newWheelButton" class="btn blue">Nueva rueda</button>
        <button id="duplicateWheelButton" class="btn">Duplicar actual</button>
        <button id="deleteWheelButton" class="btn red">Borrar actual</button>
      </div>
    </aside>

    <button id="leftSplitter" class="splitter" type="button" role="separator" aria-label="Ajustar panel izquierdo" aria-orientation="vertical" aria-valuemin="220" aria-valuemax="520" aria-valuenow="280" tabindex="0">
      <span class="splitter-handle" aria-hidden="true"></span>
    </button>

    <section class="main">
      <div class="top-title">
        <div class="tiny-tag">Tiny Wheel</div>
        <input id="wheelNameInput" class="title-input" type="text" maxlength="42" aria-label="Nombre de la rueda" />
      </div>

      <div class="wheel-stage" aria-label="Ruleta de decisiones">
        <div class="wheel-shadow"></div>
        <canvas id="wheelCanvas" width="1000" height="1000"></canvas>
        <div id="wheelTooltip" class="wheel-tooltip" role="tooltip" hidden></div>
        <div class="pointer" aria-hidden="true"></div>
        <button id="spinButton" class="center-button" aria-label="Girar ruleta"></button>
      </div>

      <div class="result" aria-live="polite">
        <div>
          <small>Resultado</small>
          <strong id="resultValue">Toca el centro para girar</strong>
        </div>
      </div>
    </section>

    <button id="rightSplitter" class="splitter" type="button" role="separator" aria-label="Ajustar panel derecho" aria-orientation="vertical" aria-valuemin="300" aria-valuemax="680" aria-valuenow="420" tabindex="0">
      <span class="splitter-handle" aria-hidden="true"></span>
    </button>

    <aside id="editorPanel" class="editor">
      <div class="editor-top">
        <div class="section-title">
          <h2>Opciones de la rueda</h2>
          <span id="totalProbability" class="total">Total: 100%</span>
        </div>
        <div class="editor-actions">
          <button id="addOptionButton" class="btn blue">Añadir opción</button>
          <button id="equalizeButton" class="btn">Igualar %</button>
        </div>
      </div>

      <div id="optionList" class="option-list"></div>

    </aside>

    <button id="toggleLeftPanelButton" class="panel-toggle panel-toggle-left" type="button" aria-controls="sidebarPanel" aria-expanded="true" title="Ocultar panel izquierdo">&lt;</button>
    <button id="toggleRightPanelButton" class="panel-toggle panel-toggle-right" type="button" aria-controls="editorPanel" aria-expanded="true" title="Ocultar panel derecho">&gt;</button>
  </main>

  <div id="dialogBackdrop" class="dialog-backdrop" hidden>
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle" aria-describedby="dialogMessage">
      <h2 id="dialogTitle"></h2>
      <p id="dialogMessage"></p>
      <input id="dialogInput" class="dialog-input" type="text" maxlength="42" />
      <textarea id="dialogTextarea" class="dialog-textarea" maxlength="280"></textarea>
      <div class="dialog-actions">
        <button id="dialogCancelButton" class="btn" type="button">Cancelar</button>
        <button id="dialogConfirmButton" class="btn blue" type="button">Aceptar</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "tiny_decision_desktop_wheels_v2";
    const LAYOUT_KEY = "tiny_decision_desktop_layout_v1";
    const FILE_META_KEY = "tiny_decision_desktop_file_meta_v1";
    const HANDLE_DB_NAME = "tiny-wheel-desktop-handles";
    const HANDLE_STORE_NAME = "files";
    const DATA_FILE_HANDLE_KEY = "wheel-data";
    const TAU = Math.PI * 2;
    const POINTER_ANGLE = -Math.PI / 2;
    const SPLITTER_SIZE = 12;
    const MIN_SIDEBAR_WIDTH = 220;
    const MAX_SIDEBAR_WIDTH = 520;
    const MIN_EDITOR_WIDTH = 300;
    const MAX_EDITOR_WIDTH = 680;
    const MIN_MAIN_WIDTH = 360;

    const defaultColors = [
      "#ef3348", "#f47742", "#df4c4c", "#d83e89", "#9d38ca",
      "#674ed7", "#2f6bdb", "#439cd2", "#80bd4c", "#f25a37", "#88c464"
    ];

    const defaultData = {
      activeWheelId: "yes-no-wheel",
      folders: [],
      wheels: [
        {
          id: "yes-no-wheel",
          name: "Si o no",
          rotation: 0,
          result: "",
          options: [
            { text: "Si", probability: 33, color: "#4caf50", enabled: true, description: "" },
            { text: "No", probability: 33, color: "#e53935", enabled: true, description: "" },
            { text: "Tal vez", probability: 34, color: "#f9a825", enabled: true, description: "" }
          ]
        }
      ]
    };

    let appData = loadData();
    let layoutState = loadLayoutState();
    let isSpinning = false;
    let draggedWheelId = null;
    let draggedOptionIndex = null;
    let dialogState = null;
    let dataFileHandle = null;
    let dataFileSaveTimer = null;
    let dataFileState = "local";

    const appRoot = document.querySelector(".app");
    const sidebarPanel = document.getElementById("sidebarPanel");
    const editorPanel = document.getElementById("editorPanel");
    const wheelList = document.getElementById("wheelList");
    const wheelNameInput = document.getElementById("wheelNameInput");
    const wheelStage = document.querySelector(".wheel-stage");
    const wheelCanvas = document.getElementById("wheelCanvas");
    const wheelTooltip = document.getElementById("wheelTooltip");
    const ctx = wheelCanvas.getContext("2d");
    const leftSplitter = document.getElementById("leftSplitter");
    const rightSplitter = document.getElementById("rightSplitter");
    const toggleLeftPanelButton = document.getElementById("toggleLeftPanelButton");
    const toggleRightPanelButton = document.getElementById("toggleRightPanelButton");
    const spinButton = document.getElementById("spinButton");
    const resultValue = document.getElementById("resultValue");
    const optionList = document.getElementById("optionList");
    const totalProbability = document.getElementById("totalProbability");
    const newWheelButton = document.getElementById("newWheelButton");
    const newFolderButton = document.getElementById("newFolderButton");
    const duplicateWheelButton = document.getElementById("duplicateWheelButton");
    const deleteWheelButton = document.getElementById("deleteWheelButton");
    const addOptionButton = document.getElementById("addOptionButton");
    const equalizeButton = document.getElementById("equalizeButton");
    const createDataFileButton = document.getElementById("createDataFileButton");
    const openDataFileButton = document.getElementById("openDataFileButton");
    const saveDataFileButton = document.getElementById("saveDataFileButton");
    const dataFileBadge = document.getElementById("dataFileBadge");
    const dataFileName = document.getElementById("dataFileName");
    const dataFileHint = document.getElementById("dataFileHint");
    const dialogBackdrop = document.getElementById("dialogBackdrop");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogMessage = document.getElementById("dialogMessage");
    const dialogInput = document.getElementById("dialogInput");
    const dialogTextarea = document.getElementById("dialogTextarea");
    const dialogCancelButton = document.getElementById("dialogCancelButton");
    const dialogConfirmButton = document.getElementById("dialogConfirmButton");

    function loadLayoutState() {
      try {
        const saved = JSON.parse(localStorage.getItem(LAYOUT_KEY));
        return normalizeLayout({
          sidebarWidth: saved?.sidebarWidth,
          editorWidth: saved?.editorWidth,
          sidebarCollapsed: saved?.sidebarCollapsed,
          editorCollapsed: saved?.editorCollapsed
        });
      } catch (error) {
        return { sidebarWidth: 280, editorWidth: 420, sidebarCollapsed: false, editorCollapsed: false };
      }
    }

    function loadData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved || !Array.isArray(saved.wheels) || saved.wheels.length === 0) {
          return structuredClone(defaultData);
        }

        const normalized = normalizeData(saved);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
        return normalized;
      } catch (error) {
        return structuredClone(defaultData);
      }
    }

    function loadFileMeta() {
      try {
        const saved = JSON.parse(localStorage.getItem(FILE_META_KEY));
        if (!saved || typeof saved.name !== "string") return null;

        const normalized = { name: saved.name };
        localStorage.setItem(FILE_META_KEY, JSON.stringify(normalized));
        return normalized;
      } catch (error) {
        return null;
      }
    }

    function saveFileMeta(name) {
      localStorage.setItem(FILE_META_KEY, JSON.stringify({
        name
      }));
    }

    function clearFileMeta() {
      localStorage.removeItem(FILE_META_KEY);
    }

    function normalizeData(data) {
      const folders = Array.isArray(data.folders)
        ? data.folders
            .filter((folder) => folder && typeof folder.name === "string")
            .map((folder, folderIndex) => ({
              id: folder.id || crypto.randomUUID(),
              name: folder.name.trim() || `Carpeta ${folderIndex + 1}`
            }))
        : [];

      const validFolderIds = new Set(folders.map((folder) => folder.id));
      const wheels = data.wheels
        .filter((wheel) => wheel && typeof wheel.name === "string")
        .map((wheel, wheelIndex) => ({
          id: wheel.id || crypto.randomUUID(),
          name: wheel.name.trim() || `Rueda ${wheelIndex + 1}`,
          folderId: validFolderIds.has(wheel.folderId) ? wheel.folderId : null,
          rotation: Number.isFinite(wheel.rotation) ? wheel.rotation : 0,
          result: typeof wheel.result === "string" ? wheel.result : "",
          options: Array.isArray(wheel.options)
            ? wheel.options.map((option, optionIndex) => ({
                text: String(option.text ?? `Opción ${optionIndex + 1}`),
                probability: sanitizeProbability(option.probability ?? option.weight ?? 1),
                color: isValidColor(option.color) ? option.color : defaultColors[optionIndex % defaultColors.length],
                enabled: option.enabled !== false,
                description: typeof option.description === "string" ? option.description : ""
              }))
            : []
        }))
        .filter((wheel) => wheel.options.length >= 2);

      if (wheels.length === 0) return structuredClone(defaultData);

      return {
        activeWheelId: wheels.some((wheel) => wheel.id === data.activeWheelId) ? data.activeWheelId : wheels[0].id,
        folders,
        wheels
      };
    }

    function saveData({ skipFileSync = false } = {}) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      if (!skipFileSync) scheduleDataFileSave();
    }

    function supportsFileSystemAccess() {
      return typeof window.showOpenFilePicker === "function" && typeof window.showSaveFilePicker === "function";
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function normalizeLayout(nextState = {}) {
      const currentRoot = document.querySelector(".app");
      const totalWidth = currentRoot?.getBoundingClientRect().width || window.innerWidth || 1200;
      const sidebarCollapsed = nextState.sidebarCollapsed === true;
      const editorCollapsed = nextState.editorCollapsed === true;
      const visibleSplitterSize = (sidebarCollapsed ? 0 : SPLITTER_SIZE) + (editorCollapsed ? 0 : SPLITTER_SIZE);
      const minVisiblePanelWidth = (sidebarCollapsed ? 0 : MIN_SIDEBAR_WIDTH) + (editorCollapsed ? 0 : MIN_EDITOR_WIDTH);
      const maxVisiblePanelWidth = Math.max(minVisiblePanelWidth, totalWidth - MIN_MAIN_WIDTH - visibleSplitterSize);

      let sidebarWidth = clamp(
        Number.isFinite(Number(nextState.sidebarWidth)) ? Number(nextState.sidebarWidth) : 280,
        MIN_SIDEBAR_WIDTH,
        MAX_SIDEBAR_WIDTH
      );
      let editorWidth = clamp(
        Number.isFinite(Number(nextState.editorWidth)) ? Number(nextState.editorWidth) : 420,
        MIN_EDITOR_WIDTH,
        MAX_EDITOR_WIDTH
      );

      const visiblePanelWidth = (sidebarCollapsed ? 0 : sidebarWidth) + (editorCollapsed ? 0 : editorWidth);

      if (visiblePanelWidth > maxVisiblePanelWidth) {
        let overflow = visiblePanelWidth - maxVisiblePanelWidth;

        if (!editorCollapsed) {
          const reduceEditor = Math.min(editorWidth - MIN_EDITOR_WIDTH, Math.ceil(overflow / (sidebarCollapsed ? 1 : 2)));
          editorWidth -= reduceEditor;
          overflow -= reduceEditor;
        }

        if (overflow > 0 && !sidebarCollapsed) {
          sidebarWidth = Math.max(MIN_SIDEBAR_WIDTH, sidebarWidth - overflow);
        }
      }

      return { sidebarWidth, editorWidth, sidebarCollapsed, editorCollapsed };
    }

    function applyLayout(nextState, { persist = true } = {}) {
      layoutState = normalizeLayout({
        sidebarWidth: nextState.sidebarWidth,
        editorWidth: nextState.editorWidth,
        sidebarCollapsed: nextState.sidebarCollapsed,
        editorCollapsed: nextState.editorCollapsed
      });

      document.documentElement.style.setProperty("--sidebar-width", `${layoutState.sidebarWidth}px`);
      document.documentElement.style.setProperty("--editor-width", `${layoutState.editorWidth}px`);
      appRoot.classList.toggle("sidebar-collapsed", layoutState.sidebarCollapsed);
      appRoot.classList.toggle("editor-collapsed", layoutState.editorCollapsed);
      sidebarPanel.setAttribute("aria-hidden", String(layoutState.sidebarCollapsed));
      editorPanel.setAttribute("aria-hidden", String(layoutState.editorCollapsed));
      leftSplitter.setAttribute("aria-valuenow", String(Math.round(layoutState.sidebarWidth)));
      rightSplitter.setAttribute("aria-valuenow", String(Math.round(layoutState.editorWidth)));
      updatePanelToggleButtons();

      if (persist) {
        localStorage.setItem(LAYOUT_KEY, JSON.stringify(layoutState));
      }
    }

    function updatePanelToggleButtons() {
      toggleLeftPanelButton.textContent = layoutState.sidebarCollapsed ? ">" : "<";
      toggleLeftPanelButton.title = layoutState.sidebarCollapsed ? "Mostrar panel izquierdo" : "Ocultar panel izquierdo";
      toggleLeftPanelButton.setAttribute("aria-label", toggleLeftPanelButton.title);
      toggleLeftPanelButton.setAttribute("aria-expanded", String(!layoutState.sidebarCollapsed));

      toggleRightPanelButton.textContent = layoutState.editorCollapsed ? "<" : ">";
      toggleRightPanelButton.title = layoutState.editorCollapsed ? "Mostrar panel derecho" : "Ocultar panel derecho";
      toggleRightPanelButton.setAttribute("aria-label", toggleRightPanelButton.title);
      toggleRightPanelButton.setAttribute("aria-expanded", String(!layoutState.editorCollapsed));
    }

    function togglePanel(side) {
      applyLayout({
        sidebarWidth: layoutState.sidebarWidth,
        editorWidth: layoutState.editorWidth,
        sidebarCollapsed: side === "left" ? !layoutState.sidebarCollapsed : layoutState.sidebarCollapsed,
        editorCollapsed: side === "right" ? !layoutState.editorCollapsed : layoutState.editorCollapsed
      });

      requestAnimationFrame(() => drawWheel(getActiveWheel()));
    }

    function startColumnResize(side) {
      return (event) => {
        if (window.matchMedia("(max-width: 980px)").matches) return;

        event.preventDefault();
        const splitter = side === "left" ? leftSplitter : rightSplitter;
        const bounds = appRoot.getBoundingClientRect();

        appRoot.classList.add("resizing");
        splitter.setPointerCapture(event.pointerId);

        const handleMove = (moveEvent) => {
          if (side === "left") {
            const visibleEditorWidth = layoutState.editorCollapsed ? 0 : layoutState.editorWidth;
            const visibleSplitterSize = SPLITTER_SIZE + (layoutState.editorCollapsed ? 0 : SPLITTER_SIZE);
            const maxWidth = Math.max(MIN_SIDEBAR_WIDTH, bounds.width - visibleEditorWidth - MIN_MAIN_WIDTH - visibleSplitterSize);
            const sidebarWidth = clamp(moveEvent.clientX - bounds.left, MIN_SIDEBAR_WIDTH, Math.min(MAX_SIDEBAR_WIDTH, maxWidth));
            applyLayout({
              sidebarWidth,
              editorWidth: layoutState.editorWidth,
              sidebarCollapsed: layoutState.sidebarCollapsed,
              editorCollapsed: layoutState.editorCollapsed
            });
            return;
          }

          const visibleSidebarWidth = layoutState.sidebarCollapsed ? 0 : layoutState.sidebarWidth;
          const visibleSplitterSize = SPLITTER_SIZE + (layoutState.sidebarCollapsed ? 0 : SPLITTER_SIZE);
          const maxWidth = Math.max(MIN_EDITOR_WIDTH, bounds.width - visibleSidebarWidth - MIN_MAIN_WIDTH - visibleSplitterSize);
          const editorWidth = clamp(bounds.right - moveEvent.clientX, MIN_EDITOR_WIDTH, Math.min(MAX_EDITOR_WIDTH, maxWidth));
          applyLayout({
            sidebarWidth: layoutState.sidebarWidth,
            editorWidth,
            sidebarCollapsed: layoutState.sidebarCollapsed,
            editorCollapsed: layoutState.editorCollapsed
          });
        };

        const stopResize = () => {
          appRoot.classList.remove("resizing");
          splitter.removeEventListener("pointermove", handleMove);
          splitter.removeEventListener("pointerup", stopResize);
          splitter.removeEventListener("pointercancel", stopResize);

          if (splitter.hasPointerCapture(event.pointerId)) {
            splitter.releasePointerCapture(event.pointerId);
          }
        };

        splitter.addEventListener("pointermove", handleMove);
        splitter.addEventListener("pointerup", stopResize);
        splitter.addEventListener("pointercancel", stopResize);
      };
    }

    function resizeByKeyboard(side, event) {
      if (window.matchMedia("(max-width: 980px)").matches) return;
      if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;

      event.preventDefault();
      const step = event.shiftKey ? 32 : 18;

      if (side === "left") {
        const direction = event.key === "ArrowRight" ? 1 : -1;
        applyLayout({
          sidebarWidth: layoutState.sidebarWidth + direction * step,
          editorWidth: layoutState.editorWidth,
          sidebarCollapsed: layoutState.sidebarCollapsed,
          editorCollapsed: layoutState.editorCollapsed
        });
        return;
      }

      const direction = event.key === "ArrowLeft" ? 1 : -1;
      applyLayout({
        sidebarWidth: layoutState.sidebarWidth,
        editorWidth: layoutState.editorWidth + direction * step,
        sidebarCollapsed: layoutState.sidebarCollapsed,
        editorCollapsed: layoutState.editorCollapsed
      });
    }

    function scheduleDataFileSave() {
      if (!dataFileHandle) return;

      clearTimeout(dataFileSaveTimer);
      dataFileSaveTimer = setTimeout(() => {
        dataFileSaveTimer = null;
        void writeDataFile({ requestPermission: false });
      }, 320);
    }

    function openHandleDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(HANDLE_DB_NAME, 1);

        request.onupgradeneeded = () => {
          if (!request.result.objectStoreNames.contains(HANDLE_STORE_NAME)) {
            request.result.createObjectStore(HANDLE_STORE_NAME);
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function readStoredFileHandle() {
      if (!("indexedDB" in window) || !supportsFileSystemAccess()) return null;

      try {
        const database = await openHandleDatabase();
        return await new Promise((resolve, reject) => {
          const transaction = database.transaction(HANDLE_STORE_NAME, "readonly");
          const request = transaction.objectStore(HANDLE_STORE_NAME).get(DATA_FILE_HANDLE_KEY);

          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
          transaction.oncomplete = () => database.close();
          transaction.onerror = () => {
            database.close();
            reject(transaction.error);
          };
        });
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    async function storeFileHandle(handle) {
      if (!("indexedDB" in window) || !supportsFileSystemAccess()) return;

      try {
        const database = await openHandleDatabase();
        await new Promise((resolve, reject) => {
          const transaction = database.transaction(HANDLE_STORE_NAME, "readwrite");
          const request = transaction.objectStore(HANDLE_STORE_NAME).put(handle, DATA_FILE_HANDLE_KEY);

          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
          transaction.oncomplete = () => database.close();
          transaction.onerror = () => {
            database.close();
            reject(transaction.error);
          };
        });
      } catch (error) {
        console.error(error);
      }
    }

    async function clearStoredFileHandle() {
      if (!("indexedDB" in window) || !supportsFileSystemAccess()) return;

      try {
        const database = await openHandleDatabase();
        await new Promise((resolve, reject) => {
          const transaction = database.transaction(HANDLE_STORE_NAME, "readwrite");
          const request = transaction.objectStore(HANDLE_STORE_NAME).delete(DATA_FILE_HANDLE_KEY);

          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
          transaction.oncomplete = () => database.close();
          transaction.onerror = () => {
            database.close();
            reject(transaction.error);
          };
        });
      } catch (error) {
        console.error(error);
      }
    }

    async function ensureFilePermission(handle, writable, requestPermission) {
      if (!handle) return false;

      const options = writable ? { mode: "readwrite" } : {};

      if (typeof handle.queryPermission === "function") {
        const permission = await handle.queryPermission(options);
        if (permission === "granted") return true;
        if (!requestPermission || typeof handle.requestPermission !== "function") return false;
        return handle.requestPermission(options).then((result) => result === "granted");
      }

      return true;
    }

    async function readDataFromFile(handle) {
      const file = await handle.getFile();
      const text = await file.text();

      if (!text.trim()) {
        return structuredClone(appData);
      }

      return normalizeData(JSON.parse(text));
    }

    function downloadDataBackup(fileName = "tiny-wheel-data.json") {
      const blob = new Blob([JSON.stringify(appData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = fileName;
      link.click();

      URL.revokeObjectURL(url);
    }

    async function bindDataFileHandle(handle, { loadContents = false, requestPermission = false } = {}) {
      dataFileHandle = handle;
      dataFileState = "linked";
      saveFileMeta(handle.name);
      await storeFileHandle(handle);

      if (loadContents) {
        const hasReadAccess = await ensureFilePermission(handle, false, requestPermission);
        if (!hasReadAccess) {
          dataFileState = "warning";
          renderFileStatus();
          return false;
        }

        try {
          appData = await readDataFromFile(handle);
          saveData({ skipFileSync: true });
          renderApp();
        } catch (error) {
          console.error(error);
          return false;
        }
      }

      renderFileStatus();
      return true;
    }

    async function writeDataFile({ requestPermission = false } = {}) {
      if (!supportsFileSystemAccess()) {
        downloadDataBackup();
        return true;
      }

      if (!dataFileHandle) {
        return createDataFile();
      }

      const hasWriteAccess = await ensureFilePermission(dataFileHandle, true, requestPermission);
      if (!hasWriteAccess) {
        dataFileState = "warning";
        renderFileStatus();
        return false;
      }

      try {
        const writable = await dataFileHandle.createWritable();
        await writable.write(JSON.stringify(appData, null, 2));
        await writable.close();
        dataFileState = "synced";
        saveFileMeta(dataFileHandle.name);
        renderFileStatus();

        return true;
      } catch (error) {
        console.error(error);
        dataFileState = "error";
        renderFileStatus();
        return false;
      }
    }

    async function createDataFile() {
      if (!supportsFileSystemAccess()) {
        downloadDataBackup();
        return true;
      }

      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: "tiny-wheel-data.json",
          types: [{
            description: "Tiny Wheel data",
            accept: { "application/json": [".json"] }
          }]
        });

        const linked = await bindDataFileHandle(handle, { loadContents: false, requestPermission: true });
        if (!linked) return false;
        return writeDataFile({ requestPermission: true });
      } catch (error) {
        if (error?.name !== "AbortError") {
          console.error(error);
        }
        return false;
      }
    }

    async function openDataFile() {
      if (!supportsFileSystemAccess()) {
        return;
      }

      try {
        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [{
            description: "Tiny Wheel data",
            accept: { "application/json": [".json"] }
          }]
        });

        await bindDataFileHandle(handle, { loadContents: true, requestPermission: true });
      } catch (error) {
        if (error?.name !== "AbortError") {
          console.error(error);
        }
      }
    }

    async function restoreLinkedDataFile() {
      if (!supportsFileSystemAccess()) {
        renderFileStatus();
        return;
      }

      const handle = await readStoredFileHandle();
      if (!handle) {
        renderFileStatus();
        return;
      }

      dataFileHandle = handle;
      saveFileMeta(handle.name);

      const hasReadAccess = await ensureFilePermission(handle, false, false);
      if (!hasReadAccess) {
        dataFileState = "warning";
        renderFileStatus();
        return;
      }

      try {
        appData = await readDataFromFile(handle);
        dataFileState = "linked";
        saveData({ skipFileSync: true });
        renderApp();
      } catch (error) {
        console.error(error);
        dataFileHandle = null;
        dataFileState = "error";
        clearFileMeta();
        await clearStoredFileHandle();
      }

      renderFileStatus();
    }

    function renderFileStatus() {
      const fileMeta = loadFileMeta();
      const linkedFileName = dataFileHandle?.name || fileMeta?.name || "Sin JSON";

      dataFileBadge.classList.remove("warning");
      saveDataFileButton.disabled = false;

      if (!supportsFileSystemAccess()) {
        dataFileBadge.textContent = "Descarga";
        dataFileName.textContent = "JSON manual";
        dataFileHint.textContent = "Este navegador no permite vincular archivos. Guardar JSON descargará una copia.";
        openDataFileButton.disabled = true;
        createDataFileButton.disabled = false;
        return;
      }

      openDataFileButton.disabled = false;
      createDataFileButton.disabled = false;

      if (!dataFileHandle && !fileMeta) {
        dataFileBadge.textContent = "Local";
        dataFileName.textContent = linkedFileName;
        dataFileHint.textContent = "Crea o vincula un archivo JSON para guardar las ruedas fuera del HTML.";
        return;
      }

      if (!dataFileHandle && fileMeta) {
        dataFileBadge.textContent = "Local";
        dataFileBadge.classList.add("warning");
        dataFileName.textContent = linkedFileName;
        dataFileHint.textContent = "Había un JSON recordado, pero hace falta volver a abrirlo para reactivar el guardado externo.";
        return;
      }

      dataFileBadge.textContent = "JSON";
      dataFileName.textContent = linkedFileName;

      if (dataFileState === "synced") {
        dataFileHint.textContent = "Archivo vinculado. Los cambios se guardan también en ese JSON y en localStorage como respaldo.";
        return;
      }

      if (dataFileState === "warning") {
        dataFileBadge.classList.add("warning");
        dataFileHint.textContent = "Archivo vinculado, pero falta permiso de lectura o escritura. Usa Guardar JSON para reactivar el acceso.";
        return;
      }

      if (dataFileState === "error") {
        dataFileBadge.classList.add("warning");
        dataFileHint.textContent = "Hubo un problema con el archivo vinculado. Puedes volver a abrirlo o crear uno nuevo.";
        return;
      }

      dataFileHint.textContent = "Archivo vinculado. La app cargará este JSON al abrirse si el navegador conserva el permiso.";
    }

    function getActiveWheel() {
      return appData.wheels.find((wheel) => wheel.id === appData.activeWheelId) || appData.wheels[0];
    }

    function getFolderName(folderId) {
      if (!folderId) return "Sin carpeta";
      return appData.folders.find((folder) => folder.id === folderId)?.name || "Sin carpeta";
    }

    function getFolderGroups() {
      return [{ id: null, name: "Sin carpeta", system: true }, ...appData.folders];
    }

    function getLastWheelIndexByFolder(folderId) {
      let lastIndex = -1;

      appData.wheels.forEach((wheel, index) => {
        if ((wheel.folderId || null) === folderId) {
          lastIndex = index;
        }
      });

      return lastIndex;
    }

      wheelList.querySelectorAll(".wheel-item, .folder-wheels").forEach((element) => {
        element.classList.remove("dragging", "drop-before", "drop-after", "drag-over");
      });
    }

    function clearOptionDragState() {
      optionList.querySelectorAll(".option-row").forEach((element) => {
        element.classList.remove("dragging", "drop-before", "drop-after");
      });
    }

    function getDropPosition(event, element) {
      const rect = element.getBoundingClientRect();
      return event.clientY > rect.top + rect.height / 2 ? "after" : "before";
    }

    function openDialog({
      title,
      message = "",
      confirmLabel = "Aceptar",
      cancelLabel = "Cancelar",
      initialValue = "",
      input = false,
      multiline = false,
      maxLength = 42
    }) {
      return new Promise((resolve) => {
        dialogState = { resolve, input, multiline };
        dialogTitle.textContent = title;
        dialogMessage.textContent = message;
        dialogConfirmButton.textContent = confirmLabel;
        dialogCancelButton.textContent = cancelLabel;
        dialogInput.hidden = !input || multiline;
        dialogTextarea.hidden = !input || !multiline;
        dialogInput.value = input && !multiline ? initialValue : "";
        dialogTextarea.value = input && multiline ? initialValue : "";
        dialogInput.maxLength = multiline ? 42 : maxLength;
        dialogTextarea.maxLength = multiline ? maxLength : 280;
        dialogBackdrop.hidden = false;

        if (input && multiline) {
          requestAnimationFrame(() => {
            dialogTextarea.focus();
            dialogTextarea.select();
          });
        } else if (input) {
          requestAnimationFrame(() => {
            dialogInput.focus();
            dialogInput.select();
          });
        } else {
          requestAnimationFrame(() => dialogConfirmButton.focus());
        }
      });
    }

    function closeDialog(result) {
      if (!dialogState) return;
      const { resolve } = dialogState;
      dialogState = null;
      dialogBackdrop.hidden = true;
      resolve(result);
    }

    function openTextDialog(config) {
      return openDialog({ ...config, input: true });
    }

    function openDescriptionDialog(config) {
      return openDialog({ ...config, input: true, multiline: true, maxLength: 280 });
    }

    function openConfirmDialog(config) {
      return openDialog({ ...config, input: false });
    }

    function moveWheelRelative(wheelId, targetWheelId, position) {
      const sourceIndex = appData.wheels.findIndex((wheel) => wheel.id === wheelId);
      const targetIndex = appData.wheels.findIndex((wheel) => wheel.id === targetWheelId);
      if (sourceIndex < 0 || targetIndex < 0 || sourceIndex === targetIndex) return;

      const targetWheel = appData.wheels[targetIndex];
      let insertIndex = position === "after" ? targetIndex + 1 : targetIndex;
      if (sourceIndex < insertIndex) insertIndex -= 1;
      if (sourceIndex === insertIndex) return;

      const [wheel] = appData.wheels.splice(sourceIndex, 1);
      wheel.folderId = targetWheel.folderId || null;
      appData.wheels.splice(insertIndex, 0, wheel);
      saveData();
      renderApp();
    }

    function moveWheelToFolder(wheelId, folderId) {
      const normalizedFolderId = folderId || null;
      const sourceIndex = appData.wheels.findIndex((wheel) => wheel.id === wheelId);
      if (sourceIndex < 0) return;

      const [wheel] = appData.wheels.splice(sourceIndex, 1);
      wheel.folderId = normalizedFolderId;

      const lastIndex = getLastWheelIndexByFolder(normalizedFolderId);
      const insertIndex = lastIndex < 0 ? appData.wheels.length : lastIndex + 1;
      appData.wheels.splice(insertIndex, 0, wheel);
      saveData();
      renderApp();
    }

    function moveOptionRelative(sourceIndex, targetIndex, position) {
      const wheel = getActiveWheel();
      if (!wheel || sourceIndex === targetIndex) return;

      let insertIndex = position === "after" ? targetIndex + 1 : targetIndex;
      if (sourceIndex < insertIndex) insertIndex -= 1;
      if (sourceIndex === insertIndex) return;

      const [option] = wheel.options.splice(sourceIndex, 1);
      wheel.options.splice(insertIndex, 0, option);
      wheel.result = "";
      saveData();
      renderOptions(wheel);
      drawWheel(wheel);
      updateWheelListSummary(wheel);
      resultValue.textContent = "Toca el centro para girar";
    }

      });
      if (name === null) return;

      const nextName = await openTextDialog({

    async function deleteFolder(folderId) {
      const folder = appData.folders.find((item) => item.id === folderId);
      if (!folder) return;

      const shouldDelete = await openConfirmDialog({
        title: "Borrar carpeta",
        message: `Las ruedas de "${folder.name}" volverán a "Sin carpeta".`,
        confirmLabel: "Borrar"
      });
