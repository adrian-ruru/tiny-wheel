<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Things Hub | Inicio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --panel: #101014;
      --panel-2: #17171d;
      --panel-3: #202028;
      --text: #f5f7fb;
      --muted: #9a9aa5;
      --line: #24242d;
      --blue: #2f80ff;
      --blue-dark: #1768e8;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      --radius-lg: 24px;
      --radius-md: 18px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      background:
        radial-gradient(circle at top center, rgba(47, 128, 255, 0.14), transparent 32%),
        radial-gradient(circle at 50% 0, rgba(28, 28, 40, 0.9), transparent 48%),
        var(--bg);
    }

    a {
      font: inherit;
    }

    .hub {
      width: min(1040px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(23, 23, 29, 0.98), rgba(12, 12, 16, 0.98));
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px;
    }

    .hero-brand {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .brand-mark {
      width: 60px;
      height: 60px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(180deg, #1b1b24, #111118);
      border: 1px solid #272732;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.4);
      font-size: 30px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .lead {
      max-width: 62ch;
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      min-height: 230px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, var(--panel-2), #0f0f14);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(47, 128, 255, 0.44);
      box-shadow: 0 22px 40px rgba(0, 0, 0, 0.42);
      outline: none;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--panel-3);
      font-size: 24px;
    }

    .card-category {
      margin: 0;
      color: var(--blue);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card h2 {
      margin: 0;
      font-size: 1.28rem;
      line-height: 1.15;
    }

    .card-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .card-action {
      color: var(--text);
      font-weight: 700;
    }

    @media (max-width: 700px) {
      .hub {
        width: min(100% - 16px, 1040px);
        padding: 16px 0 36px;
      }

      .hero {
        padding: 16px;
      }

      .hero-brand {
        align-items: flex-start;
      }

      .card-footer {
        align-items: stretch;
        flex-direction: column;
      }
    }

    @media (max-width: 460px) {
      .hero-brand {
        flex-direction: column;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        font-size: 26px;
      }

      h1 {
        font-size: clamp(1.8rem, 9vw, 2.4rem);
      }

    }
  </style>
</head>
<body>
  <main class="hub">
    <header class="hero panel">
      <div class="hero-brand">
        <div class="brand-mark" aria-hidden="true">🎲</div>
        <div>
          <p class="eyebrow">Hub general del proyecto</p>
          <h1>Random Things Hub</h1>
          <p class="lead">Selecciona una herramienta del proyecto y abre cada módulo desde un único punto de entrada.</p>
        </div>
      </div>
    </header>

    <section id="pageGrid" class="grid" aria-label="Herramientas del proyecto"></section>
  </main>

  <script>
    const pages = [
      {
        title: "Tiny Wheel",
        category: "Ruleta",
        description: "Ruleta principal del proyecto con editor visual y guardado en JSON.",
        href: "html/tiny-wheel.html",
        emoji: "🛞"
      },
      {
        title: "Roller Dice",
        category: "Dados",
        description: "Lanza dados y toma decisiones rápidas.",
        href: "html/roller-dice.html",
        emoji: "🎲"
      },
      {
        title: "Números aleatorios",
        category: "Rango numérico",
        description: "Genera números dentro de un rango configurable.",
        href: "html/ramdom-numbers.html",
        emoji: "🔢"
      },
      {
        title: "Coin Flip",
        category: "Moneda",
        description: "Cara o cruz para resolver una elección binaria.",
        href: "html/coin-flip.html",
        emoji: "🪙"
      }
    ];

    const grid = document.querySelector("#pageGrid");

    function createCard(page) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = page.href;
      card.setAttribute("aria-label", `Abrir ${page.title}`);

      card.innerHTML = `
        <div class="card-head">
          <span class="card-icon" aria-hidden="true">${page.emoji}</span>
        </div>
        <div>
          <p class="card-category">${page.category}</p>
          <h2>${page.title}</h2>
        </div>
        <p class="card-description">${page.description}</p>
        <div class="card-footer">
          <span class="card-action">Abrir herramienta</span>
        </div>
      `;

      return card;
    }

    function renderPages() {
      grid.replaceChildren(...pages.map(createCard));
    }

    renderPages();
  </script>
</body>
</html>
